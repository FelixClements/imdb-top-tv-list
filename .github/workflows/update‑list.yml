name: Update IMDb Top TV and Movie Lists

# -----------------------------------------------------------------
# Triggers
# -----------------------------------------------------------------
on:
  schedule:
    - cron: '0 3 * * *'        # daily at 03:00 UTC
  workflow_dispatch:           # manual run from the UI

# -----------------------------------------------------------------
# Job definition
# -----------------------------------------------------------------
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write           # needed for the commit & push

    steps:
      # -----------------------------------------------------------------
      # 1️⃣ Checkout the repo
      # -----------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------------------------------------------
      # 2️⃣ Set up Python
      # -----------------------------------------------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # -----------------------------------------------------------------
      # 3️⃣ Install pip dependencies
      # -----------------------------------------------------------------
      - name: Install pip dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # -----------------------------------------------------------------
      # 3.5️⃣ Install Playwright browsers
      # -----------------------------------------------------------------
      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      # -----------------------------------------------------------------
      # 4️⃣ Generate TV show JSON lists (5 / 10 / 25)
      # -----------------------------------------------------------------
      - name: Generate top 5 TV shows
        run: |
          python generate_list.py -n 5 -o top_5.json
      - name: Wait a moment (timestamps)
        run: sleep 2

      - name: Generate top 10 TV shows
        run: |
          python generate_list.py -n 10 -o top_10.json
      - name: Wait a moment (timestamps)
        run: sleep 2

      - name: Generate top 25 TV shows
        run: |
          python generate_list.py -n 25 -o top_25.json
      - name: Wait a moment (timestamps)
        run: sleep 2

      # -----------------------------------------------------------------
      # 5️⃣ Generate movie JSON lists (5 / 10 / 25) - Bollywood excluded
      # -----------------------------------------------------------------
      - name: Generate top 5 movies
        run: |
          python generate_movies.py -n 5 -o top_movies_5.json
      - name: Wait a moment (timestamps)
        run: sleep 2

      - name: Generate top 10 movies
        run: |
          python generate_movies.py -n 10 -o top_movies_10.json
      - name: Wait a moment (timestamps)
        run: sleep 2

      - name: Generate top 25 movies
        run: |
          python generate_movies.py -n 25 -o top_movies_25.json
      - name: Wait a moment (timestamps)
        run: sleep 2

      # -----------------------------------------------------------------
      # 6️⃣ Commit & push any changed JSON files
      # -----------------------------------------------------------------
      - name: Commit JSON changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: |
            🤖 Update IMDb top TV shows and movies JSON lists
          file_pattern: "top_*.json top_movies_*.json"